<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogo 2025</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:#f5f2ee;min-height:100vh;}
#welcome{position:fixed;inset:0;background:#1c1c1c;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;padding:2rem;text-align:center;}
.w-brand{font-family:"Cormorant Garamond",serif;font-size:36px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:#f0ece4;}
.w-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#9a9080;}
.w-enter{margin-top:0.75rem;padding:15px 52px;background:#f0ece4;color:#1c1c1c;border:none;border-radius:4px;font-size:14px;letter-spacing:2px;text-transform:uppercase;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all .2s;}
.w-enter:hover{background:#fff;transform:scale(1.02);}
.w-admin-link{font-size:10px;color:#3a3a3a;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:1px solid #3a3a3a;padding-bottom:1px;}
.w-admin-link:hover{color:#777;}
#admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:10000;display:none;align-items:center;justify-content:center;}
#admin-overlay.show{display:flex;}
.pw-box{background:#fff;border-radius:12px;padding:2.5rem 2rem;text-align:center;max-width:320px;width:90%;}
.pw-box h2{font-family:"Cormorant Garamond",serif;font-size:22px;margin-bottom:0.35rem;color:#1c1c1c;}
.pw-box p{font-size:12px;color:#aaa;margin-bottom:1.25rem;}
.pw-box input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:0.5rem;outline:none;font-family:"DM Sans",sans-serif;}
.pw-box input:focus{border-color:#1c1c1c;}
.pw-btn{width:100%;padding:10px;background:#1c1c1c;color:#f0ece4;border:none;border-radius:6px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:"DM Sans",sans-serif;margin-bottom:0.4rem;}
.pw-cancel{width:100%;padding:7px;background:transparent;color:#bbb;border:none;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.pw-error{font-size:11px;color:#c0392b;margin-bottom:0.5rem;display:none;}
.header{background:#1c1c1c;color:#f0ece4;padding:1.5rem;text-align:center;position:relative;}
.brand{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:600;letter-spacing:5px;text-transform:uppercase;}
.brand-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#9a9080;margin-top:4px;}
#admin-badge{display:none;position:absolute;top:50%;right:1rem;transform:translateY(-50%);background:#2e7d32;color:#fff;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;}
#admin-badge.show{display:block;}
.controls{padding:0.7rem 1rem;display:flex;gap:5px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e8e4de;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.fb{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border:1px solid #ccc;border-radius:3px;background:transparent;color:#666;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s;white-space:nowrap;}
.fb:hover,.fb.on{background:#1c1c1c;border-color:#1c1c1c;color:#f0ece4;}
.sep{width:1px;height:20px;background:#e0dbd4;margin:0 2px;flex-shrink:0;}
.count{font-size:11px;color:#bbb;margin-left:auto;}
#cart-btn{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:13px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;box-shadow:0 4px 16px rgba(37,211,102,.4);z-index:200;display:none;align-items:center;gap:8px;transition:all .2s;}
#cart-btn:hover{transform:scale(1.04);}
#cart-btn.show{display:flex;}
#cart-count{background:#fff;color:#25D366;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
#cart-panel{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;}
#cart-panel.show{display:block;}
.cart-drawer{position:absolute;right:0;top:0;bottom:0;width:min(420px,100vw);background:#fff;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.15);}
.cart-header{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid #f0ebe3;display:flex;align-items:center;justify-content:space-between;}
.cart-header h2{font-family:"Cormorant Garamond",serif;font-size:20px;color:#1c1c1c;}
.cart-close{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1;}
.cart-items{flex:1;overflow-y:auto;padding:1rem;}
.cart-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f5f2ee;}
.cart-item img,.cart-item-no-img{width:64px;height:64px;object-fit:cover;border-radius:6px;background:#f0ebe3;flex-shrink:0;}
.cart-item-no-img{display:flex;align-items:center;justify-content:center;font-size:26px;}
.ci-info{flex:1;}
.ci-name{font-size:13px;font-weight:500;color:#1c1c1c;margin-bottom:2px;}
.ci-sub{font-size:11px;color:#aaa;margin-bottom:6px;}
.ci-row{display:flex;align-items:center;justify-content:space-between;}
.ci-price{font-size:13px;font-weight:500;color:#1c1c1c;}
.ci-qty{display:flex;align-items:center;gap:6px;}
.ci-qbtn{width:22px;height:22px;border:1px solid #ddd;background:#fafafa;border-radius:4px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#444;}
.ci-qbtn:hover{background:#1c1c1c;color:#fff;border-color:#1c1c1c;}
.ci-qnum{font-size:13px;font-weight:500;min-width:18px;text-align:center;}
.ci-del{background:none;border:none;color:#e74c3c;font-size:16px;cursor:pointer;padding:2px 6px;}
.cart-empty{text-align:center;padding:3rem 1rem;color:#bbb;font-size:13px;}
.cart-footer{padding:1.25rem;border-top:1px solid #f0ebe3;}
.cart-total{font-size:15px;font-weight:500;color:#1c1c1c;margin-bottom:1rem;display:flex;justify-content:space-between;}
.cart-name-input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:0.75rem;outline:none;font-family:"DM Sans",sans-serif;}
.cart-name-input:focus{border-color:#25D366;}
.send-btn{width:100%;padding:13px;background:#25D366;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.send-btn:hover{background:#1ebe5d;}
.section{padding:1rem 1rem 6rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
.card{background:#fff;border:1px solid #e8e4de;border-radius:10px;overflow:hidden;transition:all .2s;position:relative;}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.09);transform:translateY(-1px);}
.card.hidden{display:none;}
.card.sold-out{opacity:.65;}
.card.sold-out .card-img img{filter:grayscale(60%);}
.card-img{width:100%;aspect-ratio:1/1;overflow:hidden;position:relative;background:#f0ebe3;display:flex;align-items:center;justify-content:center;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.no-img{font-size:42px;}
.sold-flag{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.sold-flag span{background:rgba(160,0,0,.85);color:#fff;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:3px;transform:rotate(-12deg);box-shadow:0 2px 10px rgba(0,0,0,.3);}
.promo-badge{position:absolute;top:8px;left:8px;background:#e74c3c;color:#fff;font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:3px;}
.card-body{padding:10px 11px;}
.cat-label{font-size:11px;font-weight:500;color:#1c1c1c;text-transform:uppercase;letter-spacing:1px;}
.size-info{font-size:11px;color:#aaa;margin:2px 0 5px;}
.price-orig{font-size:11px;color:#bbb;text-decoration:line-through;}
.price-unit{font-size:13px;font-weight:500;color:#1c1c1c;}
.price-pair{font-size:10px;color:#ccc;}
.add-btn{width:100%;margin-top:8px;padding:7px;background:#1c1c1c;color:#f0ece4;border:none;border-radius:5px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s;}
.add-btn:hover{background:#333;}
.add-btn:disabled{background:#eee;color:#bbb;cursor:not-allowed;}
.admin-controls{display:none;padding:8px 11px;border-top:1px solid #f0ebe3;gap:4px;flex-direction:column;}
body.is-admin .admin-controls{display:flex;}
.qty-row{display:flex;align-items:center;gap:6px;}
.qty-label{font-size:11px;color:#777;flex:1;}
.qty-label b{color:#1c1c1c;}
.qty-btns{display:flex;gap:3px;}
.qty-btn{width:22px;height:22px;border:1px solid #ddd;background:#fafafa;border-radius:4px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#444;transition:all .1s;}
.qty-btn:hover{background:#1c1c1c;color:#fff;border-color:#1c1c1c;}
.admin-edit-row{display:flex;gap:4px;}
.edit-btn{flex:1;padding:5px 4px;font-size:10px;border:1px solid #ddd;border-radius:4px;background:#fafafa;cursor:pointer;font-family:"DM Sans",sans-serif;color:#555;text-transform:uppercase;letter-spacing:.5px;}
.edit-btn:hover{background:#1c1c1c;color:#fff;border-color:#1c1c1c;}
.del-btn{padding:5px 8px;font-size:10px;border:1px solid #fcc;border-radius:4px;background:#fff5f5;cursor:pointer;font-family:"DM Sans",sans-serif;color:#e74c3c;text-transform:uppercase;}
.del-btn:hover{background:#e74c3c;color:#fff;border-color:#e74c3c;}
#add-product-btn{display:none;position:fixed;bottom:20px;left:20px;background:#1c1c1c;color:#f0ece4;border:none;border-radius:50px;padding:12px 18px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:"DM Sans",sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:200;}
body.is-admin #add-product-btn{display:block;}
#add-product-btn:hover{background:#333;}
#edit-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;padding:1rem;}
#edit-modal.show{display:flex;}
.modal-box{background:#fff;border-radius:12px;padding:1.75rem;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.modal-box h3{font-family:"Cormorant Garamond",serif;font-size:20px;margin-bottom:1.25rem;color:#1c1c1c;}
.field{margin-bottom:.85rem;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:4px;}
.field input,.field select{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:"DM Sans",sans-serif;outline:none;}
.field input:focus,.field select:focus{border-color:#1c1c1c;}
.img-upload{border:2px dashed #ddd;border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;}
.img-upload:hover{border-color:#1c1c1c;}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-preview{width:100%;max-height:140px;object-fit:cover;border-radius:6px;margin-top:8px;display:none;}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem;}
.modal-save{flex:1;padding:11px;background:#1c1c1c;color:#f0ece4;border:none;border-radius:6px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:"DM Sans",sans-serif;}
.modal-cancel{flex:1;padding:11px;background:#f5f5f5;color:#555;border:none;border-radius:6px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:"DM Sans",sans-serif;}
</style>
</head>

<div id="welcome">
  <div class="w-brand">Catalogo</div>
  <div class="w-sub">Colecao 2025 - Atacado</div>
  <button class="w-enter" id="btn-enter">Ver catalogo</button>
  <a class="w-admin-link" id="btn-admin-link">acesso restrito</a>
</div>

<div id="admin-overlay">
  <div class="pw-box">
    <h2>Acesso admin</h2>
    <p>Gerencie produtos e estoque</p>
    <input type="password" id="pw-input" placeholder="Senha">
    <div class="pw-error" id="pw-error">Senha incorreta.</div>
    <button class="pw-btn" id="pw-ok-btn">Entrar</button>
    <button class="pw-cancel" id="pw-cancel-btn">Cancelar</button>
  </div>
</div>

<div id="catalog" style="display:none;">
  <div class="header">
    <div class="brand">Catalogo de Produtos</div>
    <div class="brand-sub">Colecao 2025 - Atacado</div>
    <div id="admin-badge">Admin</div>
  </div>
  <div class="controls">
    <button class="fb on" id="btn-calcados">Calcados</button>
    <button class="fb" id="btn-bolsas">Bolsas</button>
    <div class="sep"></div>
    <div id="size-filters" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
    <span class="count" id="count"></span>
  </div>
  <div class="section">
    <div class="grid" id="grid"></div>
  </div>
</div>

<button id="cart-btn">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
  Carrinho
  <span id="cart-count">0</span>
</button>

<button id="add-product-btn">+ Adicionar produto</button>

<div id="cart-panel">
  <div class="cart-drawer">
    <div class="cart-header">
      <h2>Meu Carrinho</h2>
      <button class="cart-close" id="cart-close-btn">x</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total:</span><span id="cart-total-val">R$ 0</span></div>
      <input class="cart-name-input" id="client-name" placeholder="Seu nome (opcional)" type="text">
      <button class="send-btn" id="send-wa-btn">
        Enviar pedido pelo WhatsApp
      </button>
    </div>
  </div>
</div>

<div id="edit-modal">
  <div class="modal-box">
    <h3 id="modal-title">Adicionar produto</h3>
    <div class="field">
      <label>Imagem</label>
      <div class="img-upload" id="img-upload-area">
        <input type="file" accept="image/*" id="img-file-input">
        <div id="img-upload-hint">Arraste ou clique para selecionar imagem</div>
        <img id="img-preview" class="img-preview">
      </div>
    </div>
    <div class="field"><label>Categoria</label>
      <select id="e-cat">
        <option>Alpargata</option><option>Sandalia</option><option>Tenis</option>
        <option>Bota</option><option>Chinelo</option><option>Bolsa</option>
        <option>Mini Tote</option><option>Pochete</option><option>Mochila</option>
        <option>Carteira</option><option>Transversal</option><option>Canga</option><option>Outro</option>
      </select>
    </div>
    <div class="field"><label>Grupo</label>
      <select id="e-group"><option value="calcados">Calcados</option><option value="bolsas">Bolsas e Acessorios</option></select>
    </div>
    <div class="field"><label>Tamanho</label><input type="text" id="e-size" placeholder="Ex: 37 ou Unico"></div>
    <div class="field"><label>Preco unitario</label><input type="text" id="e-price" placeholder="Ex: R$ 70"></div>
    <div class="field"><label>Promocao (2 pecas)</label><input type="text" id="e-pair" placeholder="Ex: 2 por R$ 130"></div>
    <div class="field"><label>Preco original riscado (opcional)</label><input type="text" id="e-orig" placeholder="Ex: R$ 90"></div>
    <div class="field"><label>Estoque</label><input type="number" id="e-qty" min="0" value="1"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel-btn">Cancelar</button>
      <button class="modal-save" id="modal-save-btn">Salvar</button>
    </div>
  </div>
</div>

var ADMIN_PASS = "1234";
var WA_NUMBER = "555186241434";
var products = [];
var stock = {};
var cart = {};
var isAdmin = false;
var currentGroup = "calcados";
var currentSize = "todos";
var editingId = null;
var pendingImg = null;

function init() {
  var saved = localStorage.getItem("catalog_v4");
  if (saved) {
    try {
      var d = JSON.parse(saved);
      products = d.products || INITIAL_DATA;
      stock = d.stock || {};
    } catch(e) { products = INITIAL_DATA; stock = {}; }
  } else {
    products = JSON.parse(JSON.stringify(INITIAL_DATA));
    stock = {};
  }
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    if (stock[p.id] === undefined) stock[p.id] = p.qty;
  }
  saveData();
}

function saveData() {
  localStorage.setItem("catalog_v4", JSON.stringify({ products: products, stock: stock }));
}

function enterCatalog() {
  document.getElementById("welcome").style.display = "none";
  document.getElementById("catalog").style.display = "block";
  buildSizeFilters();
  renderGrid();
}

function showAdminLogin() {
  document.getElementById("admin-overlay").classList.add("show");
  setTimeout(function() { document.getElementById("pw-input").focus(); }, 100);
}

function closeAdminLogin() {
  document.getElementById("admin-overlay").classList.remove("show");
  document.getElementById("pw-input").value = "";
  document.getElementById("pw-error").style.display = "none";
}

function checkPw() {
  if (document.getElementById("pw-input").value === ADMIN_PASS) {
    isAdmin = true;
    document.body.classList.add("is-admin");
    closeAdminLogin();
    document.getElementById("welcome").style.display = "none";
    document.getElementById("catalog").style.display = "block";
    document.getElementById("admin-badge").classList.add("show");
    buildSizeFilters();
    renderGrid();
  } else {
    document.getElementById("pw-error").style.display = "block";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

function buildSizeFilters() {
  var c = document.getElementById("size-filters");
  c.innerHTML = "";
  if (currentGroup === "bolsas") return;
  var sizes = [];
  for (var i = 0; i < products.length; i++) {
    if (products[i].group === "calcados") {
      var s = products[i].size;
      if (sizes.indexOf(s) === -1) sizes.push(s);
    }
  }
  sizes.sort(function(a, b) { return parseFloat(a) - parseFloat(b); });
  c.appendChild(mkSizeBtn("Todos", "todos", currentSize === "todos"));
  for (var j = 0; j < sizes.length; j++) {
    c.appendChild(mkSizeBtn(sizes[j], sizes[j], currentSize === sizes[j]));
  }
}

function mkSizeBtn(label, val, active) {
  var b = document.createElement("button");
  b.className = "fb" + (active ? " on" : "");
  b.textContent = label;
  b.setAttribute("data-val", val);
  b.onclick = function() {
    currentSize = this.getAttribute("data-val");
    var btns = document.querySelectorAll("#size-filters .fb");
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove("on");
    this.classList.add("on");
    renderGrid();
  };
  return b;
}

function setGroup(g) {
  currentGroup = g;
  currentSize = "todos";
  document.getElementById("btn-calcados").classList.toggle("on", g === "calcados");
  document.getElementById("btn-bolsas").classList.toggle("on", g === "bolsas");
  buildSizeFilters();
  renderGrid();
}

var CAT_EMOJI = {"Mochila":"bag","Pochete":"bag","Carteira":"bag","Bolsa":"bag","Mini Tote":"bag","Transversal":"bag","Canga":"beach","Bolsa Carteirita":"bag","Bolsa Listrada":"bag"};

function renderGrid() {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  var data = [];
  for (var i = 0; i < products.length; i++) {
    if (products[i].group === currentGroup) {
      if (currentGroup === "calcados" && currentSize !== "todos" && products[i].size !== currentSize) continue;
      data.push(products[i]);
    }
  }
  document.getElementById("count").textContent = data.length + " produtos";
  if (!data.length) {
    grid.innerHTML = "<p style='color:#bbb;font-size:13px;padding:2rem;grid-column:1/-1;text-align:center;'>Nenhum produto encontrado.</p>";
    return;
  }
  for (var j = 0; j < data.length; j++) {
    var p = data[j];
    var qty = (stock[p.id] !== undefined) ? stock[p.id] : p.qty;
    var sold = qty <= 0;
    var inCart = cart[p.id] || 0;
    var card = document.createElement("div");
    card.className = "card" + (sold ? " sold-out" : "");
    card.id = "card-" + p.id;
    var imgHtml = p.b64
      ? '<img src="data:image/jpeg;base64,' + p.b64 + '" alt="' + p.cat + '" loading="lazy">'
      : '<div class="no-img">👜</div>';
    var soldHtml = sold ? '<div class="sold-flag"><span>Esgotado</span></div>' : "";
    var promoHtml = p.promo ? '<div class="promo-badge">' + p.promo + '</div>' : "";
    var origHtml = p.orig_price ? '<div class="price-orig">' + p.orig_price + '</div>' : "";
    var addTxt = sold ? "Esgotado" : (inCart > 0 ? "No carrinho (" + inCart + ")" : "Adicionar");
    card.innerHTML =
      '<div class="card-img">' + imgHtml + soldHtml + promoHtml + '</div>' +
      '<div class="card-body">' +
        '<div class="cat-label">' + p.cat + '</div>' +
        '<div class="size-info">Tam. ' + p.size + '</div>' +
        origHtml +
        '<div class="price-unit">' + p.price + '</div>' +
        '<div class="price-pair">' + (p.pair || "") + '</div>' +
        '<button class="add-btn" ' + (sold ? "disabled" : "") + ' data-id="' + p.id + '">' + addTxt + '</button>' +
      '</div>' +
      '<div class="admin-controls">' +
        '<div class="qty-row"><span class="qty-label">Estoque: <b>' + qty + '</b></span>' +
        '<div class="qty-btns">' +
          '<button class="qty-btn" data-id="' + p.id + '" data-d="-1">-</button>' +
          '<button class="qty-btn" data-id="' + p.id + '" data-d="1">+</button>' +
        '</div></div>' +
        '<div class="admin-edit-row">' +
          '<button class="edit-btn" data-id="' + p.id + '">Editar</button>' +
          '<button class="del-btn" data-id="' + p.id + '">Excluir</button>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  }

  // Events
  var addBtns = grid.querySelectorAll(".add-btn");
  for (var k = 0; k < addBtns.length; k++) {
    addBtns[k].addEventListener("click", function() { addToCart(parseInt(this.getAttribute("data-id"))); });
  }
  var qtyBtns = grid.querySelectorAll(".qty-btn");
  for (var l = 0; l < qtyBtns.length; l++) {
    qtyBtns[l].addEventListener("click", function() { chgQty(parseInt(this.getAttribute("data-id")), parseInt(this.getAttribute("data-d"))); });
  }
  var editBtns = grid.querySelectorAll(".edit-btn");
  for (var m = 0; m < editBtns.length; m++) {
    editBtns[m].addEventListener("click", function() { openEditModal(parseInt(this.getAttribute("data-id"))); });
  }
  var delBtns = grid.querySelectorAll(".del-btn");
  for (var n = 0; n < delBtns.length; n++) {
    delBtns[n].addEventListener("click", function() { deleteProduct(parseInt(this.getAttribute("data-id"))); });
  }
}

function chgQty(id, d) {
  if (!isAdmin) return;
  stock[id] = Math.max(0, (stock[id] || 0) + d);
  saveData();
  renderGrid();
}

function addToCart(id) {
  var qty = stock[id] || 0;
  if (qty <= 0) return;
  var inCart = cart[id] || 0;
  if (inCart >= qty) { alert("Quantidade maxima em estoque atingida!"); return; }
  cart[id] = inCart + 1;
  updateCartBtn();
  renderGrid();
}

function updateCartBtn() {
  var total = 0;
  for (var k in cart) total += cart[k];
  document.getElementById("cart-count").textContent = total;
  document.getElementById("cart-btn").classList.toggle("show", total > 0);
}

function openCart() {
  renderCartItems();
  document.getElementById("cart-panel").classList.add("show");
}

function closeCart() {
  document.getElementById("cart-panel").classList.remove("show");
}

function renderCartItems() {
  var cont = document.getElementById("cart-items");
  var ids = Object.keys(cart).filter(function(id) { return cart[id] > 0; });
  if (!ids.length) {
    cont.innerHTML = '<div class="cart-empty">Nenhum item no carrinho.</div>';
    document.getElementById("cart-total-val").textContent = "R$ 0";
    return;
  }
  var total = 0;
  var html = "";
  for (var i = 0; i < ids.length; i++) {
    var id = ids[i];
    var p = null;
    for (var j = 0; j < products.length; j++) { if (products[j].id == id) { p = products[j]; break; } }
    if (!p) continue;
    var qty = cart[id];
    var priceStr = (p.price || "0").replace(/[^0-9,]/g, "").replace(",",".");
    var priceNum = parseFloat(priceStr) || 0;
    total += priceNum * qty;
    var imgHtml = p.b64
      ? '<img src="data:image/jpeg;base64,' + p.b64 + '" alt="' + p.cat + '">'
      : '<div class="cart-item-no-img">👜</div>';
    html += '<div class="cart-item">' + imgHtml +
      '<div class="ci-info">' +
        '<div class="ci-name">' + p.cat + '</div>' +
        '<div class="ci-sub">Tam. ' + p.size + '</div>' +
        '<div class="ci-row">' +
          '<span class="ci-price">' + p.price + '</span>' +
          '<div class="ci-qty">' +
            '<button class="ci-qbtn" onclick="ciChg(' + id + ',-1)">-</button>' +
            '<span class="ci-qnum">' + qty + '</span>' +
            '<button class="ci-qbtn" onclick="ciChg(' + id + ',1)">+</button>' +
            '<button class="ci-del" onclick="ciDel(' + id + ')">X</button>' +
          '</div>' +
        '</div>' +
      '</div></div>';
  }
  cont.innerHTML = html;
  var totalStr = total.toFixed(2).replace(".", ",");
  document.getElementById("cart-total-val").textContent = "R$ " + totalStr;
}

function ciChg(id, d) {
  var qty = stock[id] || 0;
  cart[id] = Math.max(0, Math.min(qty, (cart[id] || 0) + d));
  if (cart[id] === 0) delete cart[id];
  updateCartBtn();
  renderCartItems();
  renderGrid();
}

function ciDel(id) {
  delete cart[id];
  updateCartBtn();
  renderCartItems();
  renderGrid();
}

    msg += "- " + p.cat + " | Tam. " + p.size + " | " + p.price + " x" + qty + "
";
  }
  msg += "
Total: R$ " + total.toFixed(2).replace(".", ",");
  var encoded = encodeURIComponent(msg);
  window.open("https://api.whatsapp.com/send/?phone=" + WA_NUMBER + "&text=" + encoded, "_blank");
}

function openEditModal(id) {
  editingId = id;
  pendingImg = null;
  var p = null;
  if (id !== null) {
    for (var i = 0; i < products.length; i++) { if (products[i].id === id) { p = products[i]; break; } }
  }
  document.getElementById("modal-title").textContent = p ? "Editar produto" : "Adicionar produto";
  document.getElementById("e-cat").value = p ? p.cat : "Alpargata";
  document.getElementById("e-group").value = p ? p.group : "calcados";
  document.getElementById("e-size").value = p ? p.size : "";
  document.getElementById("e-price").value = p ? p.price : "";
  document.getElementById("e-pair").value = p ? (p.pair || "") : "";
  document.getElementById("e-orig").value = p ? (p.orig_price || "") : "";
  document.getElementById("e-qty").value = p ? (stock[p.id] !== undefined ? stock[p.id] : p.qty) : 1;
  var preview = document.getElementById("img-preview");
  var hint = document.getElementById("img-upload-hint");
  if (p && p.b64) {
    preview.src = "data:image/jpeg;base64," + p.b64;
    preview.style.display = "block";
    hint.style.display = "none";
  } else {
    preview.style.display = "none";
    hint.style.display = "block";
    hint.textContent = "Arraste ou clique para selecionar imagem";
  }
  document.getElementById("edit-modal").classList.add("show");
}

function closeEditModal() {
  document.getElementById("edit-modal").classList.remove("show");
  editingId = null;
  pendingImg = null;
}

function handleImgFile(input) {
  var file = input.files ? input.files[0] : input;
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement("canvas");
      var max = 300;
      var w = img.width, h = img.height;
      if (w > h) { if (w > max) { h = h*max/w; w = max; } }
      else { if (h > max) { w = w*max/h; h = max; } }
      canvas.width = Math.round(w);
      canvas.height = Math.round(h);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      pendingImg = canvas.toDataURL("image/jpeg", 0.65).split(",")[1];
      var preview = document.getElementById("img-preview");
      preview.src = "data:image/jpeg;base64," + pendingImg;
      preview.style.display = "block";
      document.getElementById("img-upload-hint").style.display = "none";
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveProduct() {
  var cat = document.getElementById("e-cat").value;
  var group = document.getElementById("e-group").value;
  var size = document.getElementById("e-size").value.trim() || "Unico";
  var price = document.getElementById("e-price").value.trim();
  var pair = document.getElementById("e-pair").value.trim();
  var orig = document.getElementById("e-orig").value.trim();
  var qty = parseInt(document.getElementById("e-qty").value) || 0;
  if (!price) { alert("Informe o preco!"); return; }
  if (editingId !== null) {
    for (var i = 0; i < products.length; i++) {
      if (products[i].id === editingId) {
        products[i].cat = cat;
        products[i].group = group;
        products[i].size = size;
        products[i].price = price;
        products[i].pair = pair;
        products[i].orig_price = orig || null;
        if (pendingImg) products[i].b64 = pendingImg;
        stock[editingId] = qty;
        break;
      }
    }
  } else {
    var newId = Date.now();
    products.push({ id: newId, cat: cat, group: group, size: size, price: price, pair: pair, orig_price: orig || null, qty: qty, b64: pendingImg || "" });
    stock[newId] = qty;
  }
  saveData();
  buildSizeFilters();
  renderGrid();
  closeEditModal();
}

function deleteProduct(id) {
  if (!confirm("Remover este produto do catalogo?")) return;
  var newList = [];
  for (var i = 0; i < products.length; i++) {
    if (products[i].id !== id) newList.push(products[i]);
  }
  products = newList;
  delete stock[id];
  delete cart[id];
  saveData();
  updateCartBtn();
  buildSizeFilters();
  renderGrid();
}

// Wire up buttons
document.getElementById("btn-enter").onclick = function() { enterCatalog(); };
document.getElementById("btn-admin-link").onclick = function() { showAdminLogin(); };
document.getElementById("pw-ok-btn").onclick = function() { checkPw(); };
document.getElementById("pw-cancel-btn").onclick = function() { closeAdminLogin(); };
document.getElementById("pw-input").onkeydown = function(e) { if (e.key === "Enter") checkPw(); };
document.getElementById("cart-btn").onclick = function() { openCart(); };
document.getElementById("cart-close-btn").onclick = function() { closeCart(); };
document.getElementById("cart-panel").onclick = function(e) { if (e.target === this) closeCart(); };
document.getElementById("send-wa-btn").onclick = function() { sendToWhatsApp(); };
document.getElementById("add-product-btn").onclick = function() { openEditModal(null); };
document.getElementById("modal-cancel-btn").onclick = function() { closeEditModal(); };
document.getElementById("modal-save-btn").onclick = function() { saveProduct(); };
document.getElementById("edit-modal").onclick = function(e) { if (e.target === this) closeEditModal(); };
document.getElementById("btn-calcados").onclick = function() { setGroup("calcados"); };
document.getElementById("btn-bolsas").onclick = function() { setGroup("bolsas"); };

document.getElementById("img-file-input").onchange = function() { handleImgFile(this); };

var area = document.getElementById("img-upload-area");
area.addEventListener("dragover", function(e) { e.preventDefault(); this.style.borderColor="#1c1c1c"; });
area.addEventListener("dragleave", function() { this.style.borderColor="#ddd"; });
area.addEventListener("drop", function(e) {
  e.preventDefault();
  this.style.borderColor="#ddd";
  var file = e.dataTransfer.files[0];
  if (file && file.type.indexOf("image") === 0) handleImgFile({files:[file]});
});

init();
</script>
